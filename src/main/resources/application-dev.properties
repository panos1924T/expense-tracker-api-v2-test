# Database Configuration
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5433}/${PG_DB:expense_tracker_db}?currentSchema=expensetrackerapp
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate / JPA properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway - tell Flyway to use the specified schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=expensetrackerapp

spring.jpa.open-in-view=false

app.security.secret-key=${JWT_SECRET_KEY}
app.security.jwt-expiration=${JWT_EXPIRATION:10800000}

allowed.origins=http://localhost:3000,http://localhost:5173